<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brief Annotations</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Unannotated Briefs — Last 7 Days</h1>
        <div class="sync-controls">
            <button id="btn-pull" onclick="syncAction('/sync/pull', this)">Pull</button>
            <button id="btn-push" onclick="syncAction('/sync/push', this)">Save &amp; Push</button>
        </div>
        <p id="sync-status" class="sync-status" hidden></p>
    </header>
    <main>
        {% if not briefs %}
            <p class="empty">All caught up — no briefs to review.</p>
        {% else %}
            <ul class="brief-list">
                {% for brief in briefs %}
                <li class="brief-item{{ ' reviewed' if brief.reviewed else '' }}">
                    <a href="/brief/{{ brief.filename }}">
                        <span class="brief-date">{{ brief.date }}</span>
                        <span class="brief-topic">{{ brief.topic }}</span>
                    </a>
                </li>
                {% endfor %}
            </ul>
        {% endif %}
    </main>
    <script>
    function syncAction(url, btn) {
        btn.disabled = true;
        fetch(url, {method: 'POST'})
            .then(r => r.json())
            .then(data => {
                const el = document.getElementById('sync-status');
                el.textContent = data.message || (data.ok ? 'Done.' : 'Error.');
                el.hidden = false;
            })
            .finally(() => { btn.disabled = false; });
    }
    </script>
</body>
</html>
